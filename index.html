<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>প্রশ্নপত্র বিল্ডার | Question Paper Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;500;600;700&family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.9/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{font-family:'Inter','Hind Siliguri',sans-serif;-webkit-font-smoothing:antialiased;background:#f5f3ee}
body{min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
.bn{font-family:'Hind Siliguri','Noto Serif Bengali',sans-serif;line-height:1.85}
.bn-serif{font-family:'Noto Serif Bengali',serif;line-height:1.9}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#4f63f8;color:#fff}.btn-primary:hover:not(:disabled){background:#3543ed}
.btn-secondary{background:#fff;color:#1a1d2e;border:1px solid #e8e5de}.btn-secondary:hover{background:#f5f3ee}
.btn-ghost{background:transparent;color:#6b7299;padding:6px 10px}.btn-ghost:hover{background:#f5f3ee}
.btn-danger{background:transparent;color:#dc2626;padding:6px 10px}.btn-danger:hover{background:#fef2f2}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
.card{background:#fff;border-radius:12px;border:1px solid #e8e5de;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.05)}
.inp{width:100%;padding:8px 12px;border:1px solid #e8e5de;border-radius:8px;font-size:13px;color:#1a1d2e;background:#fff;outline:none;transition:border .15s,box-shadow .15s;font-family:'Hind Siliguri','Inter',sans-serif}
.inp:focus{border-color:#9bb1fd;box-shadow:0 0 0 3px rgba(79,99,248,.12)}
.ta{width:100%;padding:8px 12px;border:1px solid #e8e5de;border-radius:8px;font-size:13px;color:#1a1d2e;background:#fff;outline:none;resize:none;transition:border .15s,box-shadow .15s;font-family:'Hind Siliguri','Inter',sans-serif;line-height:1.8}
.ta:focus{border-color:#9bb1fd;box-shadow:0 0 0 3px rgba(79,99,248,.12)}
.lbl{display:block;font-size:11px;font-weight:600;color:#6b7299;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.badge-mcq{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.badge-cq{background:#f5f3ff;color:#6d28d9;border:1px solid #ddd6fe;font-family:'Hind Siliguri',sans-serif}
.badge-sq{background:#f0fdfa;color:#0f766e;border:1px solid #99f6e4}

/* Layout */
.toolbar{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.88);backdrop-filter:blur(12px);border-bottom:1px solid #e8e5de;height:56px;display:flex;align-items:center;padding:0 16px;gap:8px}
.logo-icon{width:34px;height:34px;border-radius:10px;background:#4f63f8;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:900;font-family:'Noto Serif Bengali',serif;flex-shrink:0}
.logo-p{font-size:13px;font-weight:700;color:#1a1d2e;line-height:1;font-family:'Hind Siliguri',sans-serif}
.logo-s{font-size:11px;color:#6b7299;line-height:1;margin-top:2px}
.main{display:flex;gap:24px;max-width:1300px;margin:0 auto;padding:24px 20px 80px}
.editor-col{width:490px;flex-shrink:0;display:flex;flex-direction:column;gap:18px}
.preview-col{flex:1;min-width:0}
.preview-sticky{position:sticky;top:68px}
.sec-hdr{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;color:#3d4166;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.sec-hdr::before{content:'';display:inline-block;width:4px;height:16px;background:#4f63f8;border-radius:2px;flex-shrink:0}
.qcard{background:#fff;border-radius:12px;border:1px solid #e8e5de;border-left-width:4px;box-shadow:0 1px 3px rgba(0,0,0,.05);transition:box-shadow .15s;margin-bottom:12px;cursor:pointer}
.qcard.active{outline:2px solid #9bb1fd;box-shadow:0 2px 12px rgba(79,99,248,.15)}
.qcard:hover{box-shadow:0 4px 16px rgba(0,0,0,.09)}
.qcard.mc{border-left-color:#3b82f6}.qcard.cq{border-left-color:#8b5cf6}.qcard.sq{border-left-color:#14b8a6}
.qcard-head{display:flex;align-items:center;gap:8px;padding:11px 14px}
.qcard-body{border-top:1px solid #f0ede8;padding:14px}
.qnum{width:22px;height:22px;border-radius:50%;background:#1a1d2e;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qprev{font-size:12px;color:#6b7299;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;font-family:'Hind Siliguri',sans-serif}
.dropzone{border:2px dashed #e8e5de;border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s}
.dropzone:hover,.dropzone.dov{border-color:#9bb1fd;background:#f0f4ff}
.notif{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid #e8e5de;box-shadow:0 8px 32px rgba(0,0,0,.12);border-radius:12px;padding:11px 16px;display:flex;align-items:center;gap:10px;min-width:260px;max-width:380px;z-index:9999;animation:sup .25s ease-out}
@keyframes sup{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:16px;box-shadow:0 16px 48px rgba(0,0,0,.2);width:100%;max-width:520px;overflow:hidden;max-height:90vh;overflow-y:auto}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid #e8e5de}
.mbody{padding:22px;display:flex;flex-direction:column;gap:18px}
.mfoot{display:flex;justify-content:flex-end;gap:10px;padding:14px 22px;border-top:1px solid #e8e5de}
.math-hint{position:fixed;bottom:0;left:0;right:0;background:#1a1d2e;color:rgba(255,255,255,.72);font-size:11px;padding:5px 12px;text-align:center;pointer-events:none;z-index:30}
.math-hint code{background:rgba(255,255,255,.15);padding:1px 5px;border-radius:4px;font-size:10px}
.opt-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.opt-lbl{width:28px;height:28px;border-radius:50%;background:#eff6ff;border:1px solid #bfdbfe;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#1d4ed8;flex-shrink:0;font-family:'Hind Siliguri',sans-serif}
.cq-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.cq-chip{width:24px;height:24px;border-radius:50%;background:#f5f3ff;border:1px solid #ddd6fe;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#6d28d9;flex-shrink:0;margin-top:20px}
.add-btns{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.prev-frame{background:#fff;border-radius:12px;border:1px solid #e8e5de;box-shadow:0 4px 24px rgba(0,0,0,.08);overflow-y:auto;max-height:calc(100vh - 128px)}
.tog{position:relative;width:40px;height:20px;border-radius:10px;background:#e5e7eb;cursor:pointer;transition:background .2s;flex-shrink:0;border:none;padding:0}
.tog.on{background:#4f63f8}
.tog-dot{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .2s;pointer-events:none}
.tog.on .tog-dot{transform:translateX(20px)}
.tabbar{display:none;gap:4px;background:#f5f3ee;border:1px solid #e8e5de;border-radius:10px;padding:4px}
.tabbtn{flex:1;padding:7px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:#6b7299;transition:all .15s}
.tabbtn.on{background:#fff;color:#1a1d2e;box-shadow:0 1px 4px rgba(0,0,0,.1)}
/* lang toggle */
.lang-tog{display:flex;align-items:center;background:#f5f3ee;border:1px solid #e8e5de;border-radius:8px;padding:3px;gap:2px}
.lang-btn{padding:3px 10px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:#6b7299;transition:all .15s;font-family:'Hind Siliguri',sans-serif}
.lang-btn.on{background:#fff;color:#1a1d2e;box-shadow:0 1px 3px rgba(0,0,0,.1)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-block}

/* ══ PAPER PREVIEW — Board-standard typography ══ */
/* Single font stack for entire paper — Noto Serif Bengali for Bangla, Times New Roman for English */
.pp{
  font-family:'Noto Serif Bengali','Times New Roman',Times,serif;
  font-size:10.5pt;line-height:1.75;color:#111;background:#fff;
  padding:8mm 10mm 10mm 10mm;
  width:100%;
}
/* Header hierarchy */
.pp-school{font-size:15pt;font-weight:700;text-align:center;line-height:1.3;margin-bottom:2px}
.pp-exam{font-size:12.5pt;font-weight:700;text-align:center;line-height:1.3;margin-bottom:2px}
.pp-subject{font-size:11.5pt;font-weight:700;text-align:center;margin-bottom:4px}
/* Meta row — fully justified */
.pp-meta-row{display:flex;justify-content:space-between;align-items:flex-start;font-size:10.5pt;font-weight:500;margin-top:4px;gap:8px}
.pp-meta-left{text-align:left;flex:1}
.pp-meta-right{text-align:right;flex:1}
.pp-meta-row2{display:flex;justify-content:space-between;font-size:10.5pt;margin-top:1px}
.pp-instruction{font-size:9.5pt;line-height:1.6;margin-top:5px;padding:3px 0 5px;border-bottom:1px solid #555;color:#222}
.pp-hdr{border-bottom:2px double #111;padding-bottom:6px;margin-bottom:0}
/* Section heading — between two rules */
.pp-sec{font-size:11.5pt;font-weight:700;text-align:center;
  border-top:1.5px solid #333;border-bottom:1.5px solid #333;
  padding:3px 0;margin:10px 0 8px}
.pp-sec-sub{font-size:9.5pt;font-weight:400;margin-left:8px;color:#444}
/* TWO-COLUMN: CSS columns for natural flow, left-first */
.pp-two-col{
  column-count:2;
  column-gap:14px;
  column-rule:1px solid rgba(0,0,0,0.12);
}
/* Question block */
.qblock{
  break-inside:avoid;
  page-break-inside:avoid;
  margin-bottom:8px;
}
.qstem{font-size:10.5pt;line-height:1.75;margin-bottom:3px;display:flex;gap:3px;align-items:flex-start}
.qstem-num{flex-shrink:0;font-weight:600;min-width:1.5em}
.qmarks{font-size:9.5pt;color:#444;flex-shrink:0;align-self:flex-start;margin-left:auto;padding-left:4px}
/* MCQ options — 2 per line within column */
.mcq-opts{display:grid;grid-template-columns:1fr 1fr;gap:0 8px;margin-left:18px;font-size:10pt;margin-top:1px}
.mcq-opt{display:flex;gap:3px;align-items:flex-start;line-height:1.65}
/* MCQ diagram */
.mcq-diag{max-width:100%;height:auto;display:block;margin:4px auto 4px 18px;max-height:90px;object-fit:contain}
/* SQ two-col via CSS columns */
.sq-two-col{column-count:2;column-gap:14px;column-rule:1px solid rgba(0,0,0,0.12)}
/* CQ stem */
.cq-stim-box{margin:3px 0 5px 16px;padding:4px 8px;border-left:2.5px solid #888;font-style:italic;font-size:10.5pt;line-height:1.75}
.cq-stim-img{max-width:100%;height:auto;display:block;margin:4px auto;max-height:100px;object-fit:contain}
.cq-subs{margin-left:16px;font-size:10.5pt}
.cq-si{display:flex;gap:5px;margin-bottom:2px;line-height:1.75;align-items:flex-start}
.cq-si-lbl{font-weight:700;min-width:1.5em;flex-shrink:0}
.cq-si-marks{margin-left:auto;flex-shrink:0;padding-left:5px;color:#444;font-size:9.5pt}
.correct-opt{font-weight:700;color:#15803d}
.pp-foot{border-top:1px solid #555;margin-top:18px;padding-top:4px;font-size:8.5pt;color:#555;text-align:center}
.prev-empty{text-align:center;padding:60px 20px;color:#9ca3af}
/* Diagram upload zone */
.diag-zone{border:1.5px dashed #c4b5fd;border-radius:8px;padding:10px;text-align:center;cursor:pointer;background:#faf5ff;transition:all .15s;font-size:12px;color:#6d28d9;margin-top:6px}
.diag-zone:hover{background:#f5f3ff;border-color:#8b5cf6}
/* Clipboard paste input box */
.paste-box{width:100%;border:1px solid #e8e5de;border-radius:6px;padding:6px 10px;font-size:12px;color:#6b7299;background:#fafaf8;cursor:pointer;outline:none;caret-color:transparent;margin-top:8px;text-align:center;font-family:'Inter',sans-serif}
.paste-box:focus{border-color:#9bb1fd;box-shadow:0 0 0 3px rgba(79,99,248,.12);color:#1a1d2e;background:#fff}

@media(max-width:760px){
  .editor-col{width:100%}.preview-col{display:none}
  .preview-col.mob-show{display:block;flex:none;width:100%}
  .editor-col.mob-hide{display:none}
  .tabbar{display:flex}.logo-p,.logo-s{display:none}
  .main{gap:0;padding:12px 12px 80px}
  .pp-two-col,.sq-two-col{column-count:1}
}
@media print{
  /* Hide chrome */
  .toolbar,.math-hint,.moverlay,.notif,.editor-col{display:none!important}
  /* Layout reset */
  .main{display:block!important;padding:0!important;margin:0!important;max-width:none!important}
  .preview-col{display:block!important;width:100%!important}
  /* Strip preview frame decoration */
  .preview-sticky{position:static!important}
  .preview-sticky > div:first-child{display:none!important}
  .prev-frame{box-shadow:none!important;border:none!important;border-radius:0!important;max-height:none!important;overflow:visible!important;background:transparent!important}
  /* Paper */
  .pp{padding:10mm 12mm!important;background:#fff!important;width:100%!important}
  /* Force two-column */
  .pp-two-col{column-count:2!important;column-gap:12px!important;column-rule:1px solid rgba(0,0,0,0.12)!important;column-fill:balance!important;overflow:visible!important;display:block!important}
  .sq-two-col{column-count:2!important;column-gap:12px!important;column-rule:1px solid rgba(0,0,0,0.12)!important;column-fill:balance!important;overflow:visible!important;display:block!important}
  .qblock{break-inside:avoid!important;page-break-inside:avoid!important;overflow:hidden!important}
  .mcq-opts{break-inside:avoid!important;page-break-inside:avoid!important;display:grid!important;grid-template-columns:1fr 1fr!important}
  @page{margin:0}
}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;color:#6b7299;font-family:Inter,sans-serif"><div style="font-size:32px">⏳</div><p style="font-size:14px">Loading...</p></div></div>
<script type="text/babel" data-presets="react">
const {useState,useReducer,useContext,createContext,useRef,useEffect,useCallback} = React;

/* ── i18n strings ── */
const T = {
  bn: {
    mcqSection:'বহুনির্বাচনি প্রশ্ন',sqSection:'সংক্ষিপ্ত প্রশ্ন',cqSection:'সৃজনশীল প্রশ্ন',
    time:'সময়',marks:'পূর্ণমান',subject:'বিষয়',set:'সেট',received:'প্রাপ্ত নম্বর',
    stimulus:'উদ্দীপক',foot:'— প্রশ্নপত্র সমাপ্ত — শুভকামনা। @mrh.du26',
    opts:{a:'ক',b:'খ',c:'গ',d:'ঘ'},
    markNum:n=>['০','১','২','৩','৪','৫','৬','৭','৮','৯'].reduce((s,d,i)=>s.replace(new RegExp(i,'g'),d),String(n)),
  },
  en: {
    mcqSection:'Multiple Choice Questions',sqSection:'Short Questions',cqSection:'Creative Questions',
    time:'Time',marks:'Total Marks',subject:'Subject',set:'Set',received:'Marks Obtained',
    stimulus:'Stimulus',foot:'— The End. Best of Luck. @mrh.du26',
    opts:{a:'a',b:'b',c:'c',d:'d'},
    markNum:n=>String(n),
  }
};

/* ── Math renderer ── */
let _n=0; const uid=()=>'q_'+Date.now()+'_'+(++_n);
function renderMath(text){
  if(!text)return'';let out='';
  for(const seg of text.split(/(\$\$[\s\S]+?\$\$)/g)){
    if(seg.startsWith('$$')&&seg.endsWith('$$')){
      try{out+=katex.renderToString(seg.slice(2,-2),{displayMode:true,throwOnError:false});}
      catch{out+='<span style="color:red">[err]</span>';}
    } else {
      for(const p of seg.split(/(\$[^$\n]+?\$)/g)){
        if(p.startsWith('$')&&p.endsWith('$')&&p.length>2){
          try{out+=katex.renderToString(p.slice(1,-1),{displayMode:false,throwOnError:false});}
          catch{out+='<span style="color:red">[err]</span>';}
        } else out+=p.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }
    }
  }
  return out;
}
const MText=({t,cls=''})=><span className={cls} dangerouslySetInnerHTML={{__html:renderMath(t||'')}}/>;

/* SmartMText — detects roman numeral statement lists (i. ii. iii.) and stacks them vertically */
function SmartMText({t,cls=''}){
  if(!t) return <span/>;
  // Split on roman numeral markers: i. ii. iii. iv. v. etc at start of a segment
  // Also handles Bengali prefix like "নিচের কোনটি" which should stay as a block after statements
  const romanRe = /(?=\b(?:i{1,3}|iv|vi{0,3}|ix|xi{0,3}|xi?v?)\.\s)/i;
  const parts = t.split(romanRe).map(s => s.trim()).filter(Boolean);

  if(parts.length <= 1){
    // No roman numerals — render normally
    return <span className={cls} dangerouslySetInnerHTML={{__html:renderMath(t)}}/>;
  }

  // Multiple parts — stack vertically
  return(
    <span className={cls} style={{display:'block'}}>
      {parts.map((part,i)=>(
        <span key={i} style={{display:'block',lineHeight:1.75}}
          dangerouslySetInnerHTML={{__html:renderMath(part)}}/>
      ))}
    </span>
  );
}
/* ── State ── */
const makeQ=type=>{
  const base={id:uid(),type};
  if(type==='mcq')return{...base,stem:'',options:{a:'',b:'',c:'',d:''},correctAnswer:'',marks:1,diagramImg:null,
    stemEn:'',optionsEn:{a:'',b:'',c:'',d:''},translatedAt:null};
  if(type==='cq') return{...base,stimulus:'',subA:'',subB:'',subC:'',subD:'',diagramImg:null,
    stimulusEn:'',subAEn:'',subBEn:'',subCEn:'',subDEn:'',translatedAt:null};
  return{...base,stem:'',marks:5,stemEn:'',translatedAt:null};
};
const defHdr={schoolName:'',examTitle:'',subject:'',subjectCode:'',time:'',totalMarks:'',year:String(new Date().getFullYear()),set:'',instructions:''};
const initState={
  header:defHdr,questions:[],
  settings:{
    apiKey:(typeof localStorage!=='undefined'&&localStorage.getItem('qpb_apikey'))||'',
    mcqStyle:(typeof localStorage!=='undefined'&&localStorage.getItem('qpb_mcq'))||'bangla',
    showAns:false,
    lang:'bn',
    paperMode:'bn', // 'bn' | 'en' — controls which version preview/export shows
  },
  ui:{settingsOpen:false,activeId:null,notif:null,tab:'editor'},
};
function reducer(s,a){
  switch(a.t){
    case 'HDR':     return{...s,header:{...s.header,...a.p}};
    case 'ADD_Q':{const q=makeQ(a.p);return{...s,questions:[...s.questions,q],ui:{...s.ui,activeId:q.id}};}
    case 'UPD_Q':   return{...s,questions:s.questions.map(q=>q.id===a.id?{...q,...a.p}:q)};
    case 'DEL_Q':   return{...s,questions:s.questions.filter(q=>q.id!==a.id),ui:{...s.ui,activeId:s.ui.activeId===a.id?null:s.ui.activeId}};
    case 'REORDER': return{...s,questions:a.p};
    case 'IMPORT':{const qs=a.p.map(q=>({...makeQ(q.type||'sq'),...q,id:uid()}));return{...s,questions:[...s.questions,...qs]};}
    case 'CLEAR':   return{...s,questions:[],header:defHdr};
    case 'SETTINGS':return{...s,settings:{...s.settings,...a.p}};
    case 'SAVE_KEY': return s; // deprecated
    case 'NOTIF':   return{...s,ui:{...s.ui,notif:a.p}};
    case 'CLRN':    return{...s,ui:{...s.ui,notif:null}};
    case 'ACTIVE':  return{...s,ui:{...s.ui,activeId:a.p}};
    case 'SETOPEN': return{...s,ui:{...s.ui,settingsOpen:a.p}};
    case 'TAB':     return{...s,ui:{...s.ui,tab:a.p}};
    default:return s;
  }
}

/* ── Claude Vision + Translation ── */
const GEMINI_URL='https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent';
const GEMINI_TEXT_URL='https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent';
function fileToB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});}

async function geminiRaw(url,body,apiKey){
  const res=await fetch(url+'?key='+apiKey,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||'Gemini error '+res.status);}
  const data=await res.json();
  return(data?.candidates?.[0]?.content?.parts?.[0]?.text||'').replace(/```json\n?/gi,'').replace(/```\n?/g,'').trim();
}
async function claudeCall(messages, maxTokens=4096, apiKey='', isVision=false){
  const url=isVision?GEMINI_URL:GEMINI_TEXT_URL;
  // convert Anthropic message format → Gemini format
  const parts=[];
  for(const m of messages){
    if(typeof m.content==='string'){parts.push({text:m.content});continue;}
    for(const p of m.content){
      if(p.type==='text') parts.push({text:p.text});
      else if(p.type==='image') parts.push({inline_data:{mime_type:p.source.media_type,data:p.source.data}});
    }
  }
  return geminiRaw(url,{contents:[{parts}],generationConfig:{maxOutputTokens:maxTokens}},apiKey);
}

async function geminiVision(file,key){
  const b64=await fileToB64(file),mime=file.type||'image/jpeg';
  const prompt=`You are an expert at reading Bangladeshi SSC/HSC exam papers. Extract ALL questions from this image as a JSON array ONLY — no markdown fences, no explanation.
Schema:
MCQ: {"type":"mcq","stem":"...","options":{"a":"...","b":"...","c":"...","d":"..."},"marks":1}
CQ:  {"type":"cq","stimulus":"...","subA":"...","subB":"...","subC":"...","subD":"..."}
SQ:  {"type":"sq","stem":"...","marks":5}
Rules: preserve Bangla script exactly. Map ক/খ/গ/ঘ options to a/b/c/d. Wrap math in $...$ or $$...$$. Return ONLY a JSON array.`;
  function extractJSON(s){
    s=s.replace(/```json\n?/gi,'').replace(/```\n?/g,'');
    try{const a=JSON.parse(s.trim());if(Array.isArray(a))return a;}catch(e){}
    const start=s.indexOf('['),end=s.lastIndexOf(']');
    if(start!==-1&&end>start){try{const a=JSON.parse(s.slice(start,end+1));if(Array.isArray(a))return a;}catch(e){}}
    return null;
  }
  const msgs=[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mime,data:b64}},{type:'text',text:prompt}]}];
  let arr=null,lastRaw='';
  try{
    const txt=await claudeCall(msgs,4096,key,true);
    lastRaw=txt;arr=extractJSON(txt);
  }catch(e){lastRaw=e.message;}
  if(!arr||!arr.length) throw new Error('Extraction failed: '+lastRaw.slice(0,150));
  return arr;
}

  await claudeCall([{role:'user',content:'Reply: OK'}],10,key);

}

/* ── Claude Translation — Bangla question → English ── */
async function geminiTranslate(q, key){
  const LATEX_RULE=`CRITICAL RULE — LATEX PROTECTION: Identify every mathematical expression wrapped inside single dollar signs ($...$) or double dollar signs ($$...$$). Treat ALL such expressions as strictly READ-ONLY. Do NOT translate them, do NOT modify any characters inside them, do NOT adjust spaces, do NOT remove or alter the dollar sign delimiters, do NOT escape or add backslashes. Copy them byte-for-byte identical to the original. This rule overrides everything else.`;

  let content='';
  if(q.type==='mcq'){
    content=`Translate this Bangladeshi MCQ exam question from Bangla to English. Return JSON ONLY, no markdown, no explanation.

${LATEX_RULE}

Input:
{"stem":"${q.stem}","options":{"a":"${q.options?.a||''}","b":"${q.options?.b||''}","c":"${q.options?.c||''}","d":"${q.options?.d||''}"}}

Output schema (JSON only):
{"stemEn":"...","optionsEn":{"a":"...","b":"...","c":"...","d":"..."}}

Additional rules: Translate only Bangla words to natural English. Roman numerals (i., ii., iii.) must be preserved exactly as-is.`;

  } else if(q.type==='cq'){
    content=`Translate this Bangladeshi Creative Question (সৃজনশীল) from Bangla to English. Return JSON ONLY, no markdown, no explanation.

${LATEX_RULE}

Input:
{"stimulus":"${q.stimulus}","subA":"${q.subA||''}","subB":"${q.subB||''}","subC":"${q.subC||''}","subD":"${q.subD||''}"}

Output schema (JSON only):
{"stimulusEn":"...","subAEn":"...","subBEn":"...","subCEn":"...","subDEn":"..."}

Additional rules: Translate only Bangla words to natural English.`;

  } else {
    content=`Translate this exam question from Bangla to English. Return JSON ONLY, no markdown, no explanation.

${LATEX_RULE}

Input: {"stem":"${q.stem}"}
Output: {"stemEn":"..."}

Additional rules: Translate only Bangla words to natural English.`;
  }

  const txt=await claudeCall([{role:'user',content}],1024,key,false);
  try{
    const s=txt.replace(/```json\n?/gi,'').replace(/```\n?/g,'').trim();
    // try direct, then find first {...}
    try{return JSON.parse(s);}catch(e){}
    const start=s.indexOf('{');const end=s.lastIndexOf('}');
    if(start!==-1&&end>start) return JSON.parse(s.slice(start,end+1));
    throw new Error('no json');
  }catch{throw new Error('Translation failed. Try again.');}
}

/* ── PDF Export ── */
async function doExport(header){
  const el=document.getElementById('pdf-root');
  if(!el)throw new Error('Preview not found');
  const prev=el.style.cssText;
  el.style.cssText='position:fixed;top:-99999px;left:0;width:794px;background:#fff;visibility:visible;display:block;z-index:-1;';
  try{
    const canvas=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#fff',width:794,logging:false});
    const imgData=canvas.toDataURL('image/png');
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=pdf.internal.pageSize.getWidth(),H=pdf.internal.pageSize.getHeight();
    const m=10,cw=W-m*2,scale=cw/(canvas.width/2),totalH=(canvas.height/2)*scale,usable=H-m*2;
    if(totalH<=usable){pdf.addImage(imgData,'PNG',m,m,cw,totalH);}
    else{
      const pages=Math.ceil(totalH/usable);
      for(let i=0;i<pages;i++){
        if(i>0)pdf.addPage();
        pdf.addImage(imgData,'PNG',m,m-(i*usable),cw,totalH);
        pdf.setFillColor(255,255,255);pdf.rect(0,0,W,m,'F');pdf.rect(0,m+usable,W,H,'F');
      }
    }
    pdf.save(((header.examTitle||'paper')+'_'+(header.subject||'exam')).replace(/\s+/g,'_')+'.pdf');
  }finally{el.style.cssText=prev;}
}

/* Clipboard paste helper */
function useClipboardPaste(onImage){
  const handlePaste=useCallback(e=>{
    const items=e.clipboardData?.items;
    if(!items)return;
    for(const item of items){
      if(item.type.startsWith('image/')){
        e.preventDefault();
        const file=item.getAsFile();
        if(file)onImage(file);
        break;
      }
    }
  },[onImage]);
  return handlePaste;
}

/* ── Reusable diagram upload (used by MCQ + CQ) ── */
function DiagramUpload({q,label='📐 Add Diagram (optional)'}){
  const{d}=useApp();
  const ref=useRef();
  const pasteRef=useRef();
  const[dov,setDov]=useState(false);

  const pick=files=>{
    const f=files&&files[0];if(!f)return;
    const r=new FileReader();
    r.onload=()=>d({t:'UPD_Q',id:q.id,p:{diagramImg:r.result}});
    r.readAsDataURL(f);
  };

  /* Ctrl+V on the paste-input box */
  const onPasteBox=e=>{
    const items=e.clipboardData?.items;
    if(!items)return;
    for(const item of items){
      if(item.type.startsWith('image/')){
        e.preventDefault();
        pick([item.getAsFile()]);
        break;
      }
    }
  };

  if(q.diagramImg){
    return(
      <div style={{marginTop:8,position:'relative',display:'inline-block',width:'100%'}}>
        <img src={q.diagramImg} alt="diagram" style={{maxWidth:'100%',maxHeight:130,objectFit:'contain',borderRadius:6,border:'1px solid #e8e5de',display:'block'}}/>
        <button className="btn btn-danger btn-sm" style={{position:'absolute',top:4,right:4,padding:'2px 7px'}}
          onClick={()=>d({t:'UPD_Q',id:q.id,p:{diagramImg:null}})}>✕ Remove</button>
      </div>
    );
  }
  return(
    <div>
      <div
        className={'diag-zone'+(dov?' dov':'')}
        onDragOver={e=>{e.preventDefault();setDov(true)}}
        onDragLeave={()=>setDov(false)}
        onDrop={e=>{e.preventDefault();setDov(false);pick(e.dataTransfer.files)}}
        onClick={()=>ref.current?.click()}
      >
        <input ref={ref} type="file" accept="image/*" style={{display:'none'}} onChange={e=>pick(e.target.files)}/>
        {label}
      </div>
      {/* Paste box — click to focus, then Ctrl+V */}
      <input
        ref={pasteRef}
        type="text"
        className="paste-box"
        readOnly
        placeholder="🖼️ Click here then press Ctrl+V to paste diagram from clipboard"
        onPaste={onPasteBox}
        onFocus={e=>e.target.style.color='#1a1d2e'}
        onBlur={e=>e.target.style.color='#6b7299'}
      />
    </div>
  );
}

      upd({...result,translatedAt:Date.now()});
      setOpen(true);
      d({t:'NOTIF',p:{type:'success',msg:'Translation done! You can now edit it.'}});
    }catch(e){
      d({t:'NOTIF',p:{type:'error',msg:e.message}});
    }finally{setLoad(false);}
  };

  const hasTranslation = q.translatedAt || q.stemEn || q.stimulusEn;

  return(
    <div style={{marginTop:12,borderTop:'1px dashed #e8e5de',paddingTop:10}}>
      {/* Header row */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:open?10:0}}>
        <span style={{fontSize:11,fontWeight:700,color:'#0f766e',textTransform:'uppercase',letterSpacing:'.05em'}}>🌐 English Version</span>
        {hasTranslation&&<span style={{fontSize:10,color:'#9ca3af'}}>✓ translated</span>}
        <div style={{flex:1}}/>
        <button
          className="btn btn-sm"
          style={{fontSize:11,padding:'3px 10px',background:loading?'#f0fdf4':'#ecfdf5',color:'#059669',border:'1px solid #6ee7b7'}}
          onClick={translate} disabled={loading}
        >
          {loading?<><span className="spin">⟳</span> Translating…</>:<>✨ {hasTranslation?'Re-translate':'Translate with AI'}</>}
        </button>
        {hasTranslation&&(
          <button className="btn btn-ghost btn-sm" style={{padding:'3px 7px'}} onClick={e=>{e.stopPropagation();setOpen(v=>!v)}}>
            {open?'▲':'▼'}
          </button>
        )}
      </div>

      {/* Editable English fields */}
      {open&&hasTranslation&&(
        <div style={{display:'flex',flexDirection:'column',gap:8,background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:10,padding:12}}>
          <p style={{fontSize:10,color:'#15803d',marginBottom:2}}>✏️ Edit the translated text below if needed</p>

          {/* MCQ English fields */}
          {q.type==='mcq'&&<>
            <div><label className="lbl" style={{color:'#059669'}}>Question (EN)</label>
              <textarea className="ta" rows={2} style={{fontSize:12,background:'#fff'}} value={q.stemEn||''} onChange={e=>upd({stemEn:e.target.value})}/>
            </div>
            {['a','b','c','d'].map(k=>(
              <div key={k} style={{display:'flex',gap:6,alignItems:'center'}}>
                <span style={{width:20,height:20,borderRadius:'50%',background:'#d1fae5',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'#059669',flexShrink:0}}>{k}</span>
                <input className="inp" style={{fontSize:12,background:'#fff'}} placeholder={`Option ${k} (EN)`}
                  value={q.optionsEn?.[k]||''} onChange={e=>upd({optionsEn:{...q.optionsEn,[k]:e.target.value}})}/>
              </div>
            ))}
          </>}

          {/* CQ English fields */}
          {q.type==='cq'&&<>
            <div><label className="lbl" style={{color:'#059669'}}>Stimulus (EN)</label>
              <textarea className="ta" rows={3} style={{fontSize:12,background:'#fffbeb'}} value={q.stimulusEn||''} onChange={e=>upd({stimulusEn:e.target.value})}/>
            </div>
            {[{k:'subAEn',l:'a) Knowledge'},{k:'subBEn',l:'b) Comprehension'},{k:'subCEn',l:'c) Application'},{k:'subDEn',l:'d) Higher-order'}].map(sub=>(
              <div key={sub.k}>
                <label className="lbl" style={{color:'#059669',fontSize:10}}>{sub.l}</label>
                <textarea className="ta" rows={2} style={{fontSize:12,background:'#fff'}} value={q[sub.k]||''} onChange={e=>upd({[sub.k]:e.target.value})}/>
              </div>
            ))}
          </>}

          {/* SQ English fields */}
          {q.type==='sq'&&(
            <div><label className="lbl" style={{color:'#059669'}}>Question (EN)</label>
              <textarea className="ta" rows={3} style={{fontSize:12,background:'#fff'}} value={q.stemEn||''} onChange={e=>upd({stemEn:e.target.value})}/>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* Question card */
function QCard({q,idx,onDS,onDE,onDEnd}){
  const{s,d}=useApp();

  const isActive=s.ui.activeId===q.id;

/* Question list */
function QList(){
  const{s,d}=useApp();const{questions}=s;
  const di=useRef(null),dv=useRef(null);
  const add=t=>d({t:'ADD_Q',p:t});
  const reorder=()=>{
    if(di.current===null||dv.current===null||di.current===dv.current)return;
    const qs=[...questions];const[m]=qs.splice(di.current,1);qs.splice(dv.current,0,m);
    d({t:'REORDER',p:qs});di.current=null;dv.current=null;
  };
  return(
    <div>
      <div className="add-btns">
        <button className="btn btn-secondary" style={{color:'#1d4ed8',borderColor:'#bfdbfe'}} onClick={()=>add('mcq')}>📝 + MCQ</button>
        <button className="btn btn-secondary" style={{color:'#6d28d9',borderColor:'#ddd6fe',fontFamily:"'Hind Siliguri',sans-serif"}} onClick={()=>add('cq')}>📚 + সৃজনশীল</button>
        <button className="btn btn-secondary" style={{color:'#0f766e',borderColor:'#99f6e4'}} onClick={()=>add('sq')}>✏️ + Short Q</button>
      </div>
      {questions.length===0&&(
        <div className="card" style={{padding:40,textAlign:'center'}}>
          <div style={{fontSize:36,marginBottom:12}}>📋</div>
          <p style={{fontWeight:600,color:'#1a1d2e',marginBottom:6}}>No questions yet</p>
          <p style={{fontSize:13,color:'#6b7299',maxWidth:260,margin:'0 auto',lineHeight:1.6}}>Add questions above or upload an image to auto-extract.</p>
        </div>
      )}
      {questions.map((q,i)=>(
        <QCard key={q.id} q={q} idx={i} onDS={()=>{di.current=i}} onDE={()=>{dv.current=i}} onDEnd={reorder}/>
      ))}
    </div>
  );
}

/* Image upload — 1-step Claude vision + Ctrl+V paste support */
function ImgUpload(){
  const{s,d}=useApp();
  const[file,setFile]=useState(null);
  const[prev,setPrev]=useState(null);
  const[loading,setLoad]=useState(false);
  const[result,setRes]=useState(null);
  const[err,setErr]=useState('');
  const[dov,setDov]=useState(false);
  const ref=useRef();
  const apiKey=s.settings.apiKey||'';

  const pick=files=>{
    const f=files&&files[0];if(!f)return;
    setFile(f);setErr('');setRes(null);setPrev(URL.createObjectURL(f));
  };

  const extract=async()=>{
    if(!apiKey){setErr('API key required. Add it in ⚙️ Settings.');return;}
    setLoad(true);setErr('');
    try{const qs=await geminiVision(file,apiKey);setRes(qs);}
    catch(e){setErr(e.message);}
    finally{setLoad(false);}
  };
  const importAll=()=>{
    if(!result||!result.length)return;
    d({t:'IMPORT',p:result});
    d({t:'NOTIF',p:{type:'success',msg:result.length+' question(s) imported!'}});
    clear();
  };
  const clear=()=>{setFile(null);if(prev)URL.revokeObjectURL(prev);setPrev(null);setRes(null);setErr('');};

  return(
    <div className="card" style={{padding:18}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
        <div className="sec-hdr" style={{margin:0}}>AI Image Extraction</div>
        <span className="badge badge-mcq" style={{fontSize:10}}>Gemini 2.0 Flash</span>
      </div>
      <p style={{fontSize:12,color:'#6b7299',marginBottom:14,lineHeight:1.6}}>Upload or paste (Ctrl+V) a photo of a question paper → Gemini auto-extracts all questions.</p>
      {!file?(
        <div>
          <div className={'dropzone'+(dov?' dov':'')}
            onDragOver={e=>{e.preventDefault();setDov(true)}}
            onDragLeave={()=>setDov(false)}
            onDrop={e=>{e.preventDefault();setDov(false);pick(e.dataTransfer.files)}}
            onClick={()=>ref.current&&ref.current.click()}>
            <input ref={ref} type="file" accept="image/*" style={{display:'none'}} onChange={e=>pick(e.target.files)}/>
            <div style={{fontSize:28,marginBottom:6}}>🖼️</div>
            <p style={{fontWeight:600,fontSize:13,color:'#1a1d2e',marginBottom:4}}>{dov?'Drop here':'Drag & drop or click to upload'}</p>
            <p style={{fontSize:11,color:'#9ca3af'}}>PNG, JPG, WEBP — max 10 MB</p>
          </div>
          {/* Paste-box — reliable Ctrl+V capture */}
          <input
            type="text"
            className="paste-box"
            readOnly
            placeholder="📋 Or: click here then press Ctrl+V to paste image from clipboard"
            onPaste={e=>{
              const items=e.clipboardData?.items;
              if(!items)return;
              for(const item of items){
                if(item.type.startsWith('image/')){
                  e.preventDefault();
                  pick([item.getAsFile()]);
                  break;
                }
              }
            }}
          />
        </div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <div style={{position:'relative',borderRadius:10,overflow:'hidden',border:'1px solid #e8e5de'}}>
            <img src={prev} alt="Question paper" style={{width:'100%',maxHeight:200,objectFit:'contain',background:'#f5f3ee',display:'block'}}/>
            <button className="btn btn-ghost btn-sm" style={{position:'absolute',top:6,right:6,background:'#fff',border:'1px solid #e8e5de'}} onClick={clear}>✕</button>
          </div>
          <p style={{fontSize:11,color:'#6b7299'}}><strong>{file.name}</strong> — {(file.size/1024).toFixed(0)} KB</p>
          {err&&<div style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:8,padding:'8px 12px',fontSize:12,color:'#dc2626',lineHeight:1.6}}>⚠️ {err}</div>}
          {loading&&<div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'#f0f4ff',border:'1px solid #c7d2fe',borderRadius:8}}>
            <span className="spin" style={{fontSize:18}}>⟳</span>
            <div><p style={{fontWeight:600,fontSize:12,color:'#3730a3'}}>Gemini analyzing image…</p><p style={{fontSize:11,color:'#6366f1'}}>Reading Bangla text, detecting question types</p></div>
          </div>}
          {result&&!loading&&<div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:8,padding:'10px 12px',fontSize:12,color:'#15803d'}}>
            <div style={{fontWeight:700,marginBottom:5}}>✅ Found {result.length} question(s)</div>
            <ul style={{listStyle:'disc',paddingLeft:16,color:'#166534'}}>
              {result.slice(0,5).map((q,i)=><li key={i}>[{(q.type||'?').toUpperCase()}] {(q.stem||q.stimulus||'').slice(0,50)}</li>)}
              {result.length>5&&<li>…and {result.length-5} more</li>}
            </ul>
          </div>}
          <div style={{display:'flex',gap:8}}>
            {!result&&<button className="btn btn-primary" style={{flex:1}} onClick={extract} disabled={loading}>{loading?<><span className="spin">⟳</span> Analyzing…</>:<>✨ Extract with Gemini</>}</button>}
            {result&&<button className="btn btn-primary" style={{flex:1}} onClick={importAll}>✅ Import {result.length} Question{result.length>1?'s':''}</button>}
            {result&&<button className="btn btn-secondary" onClick={()=>{setRes(null);setErr('');}}>↩ Re-extract</button>}
            <button className="btn btn-secondary" onClick={clear}>Clear</button>
          </div>
          <p style={{fontSize:10,color:'#9ca3af',textAlign:'center'}}>Powered by Claude AI (claude-sonnet-4-6)</p>
        </div>
      )}
    </div>
  );
}

        )}
        {h.set&&<div className="pp-meta-row2"><span><strong>{tr.set}:</strong> {h.set}</span><span><strong>{tr.received}:</strong> ____</span></div>}
        {h.instructions&&<div className="pp-instruction">{h.instructions}</div>}
      </div>

      {questions.length===0&&<div className="prev-empty"><div style={{fontSize:36,marginBottom:10}}>📄</div><p style={{fontWeight:600}}>Your paper will appear here</p></div>}

      {mcqs.length>0&&<>
        <div className="pp-sec">{isEN?'Multiple Choice Questions':tr.mcqSection}<span className="pp-sec-sub">[{num(mmk)} {isEN?'marks':lang==='bn'?'নম্বর':'marks'}]</span></div>
        <div className="pp-two-col">
          {mcqs.map((q,i)=>(
            <div key={q.id} className="qblock">
              <div className="qstem">
                <span className="qstem-num">{num(i+1)}.</span>

              </div>
              {q.diagramImg&&<img src={q.diagramImg} alt="figure" className="mcq-diag"/>}
              <div className="mcq-opts">
                {['a','b','c','d'].map(k=>(
                  <div key={k} className={'mcq-opt'+(sa&&q.correctAnswer===k?' correct-opt':'')}>
                    <span style={{fontWeight:600,flexShrink:0}}>({L[k]})</span>
                    <MText t={txt(q.options?.[k]||'',q.optionsEn?.[k]||'')}/>
                    {sa&&q.correctAnswer===k&&<span style={{color:'#15803d',marginLeft:3}}>✓</span>}
                  </div>
                ))}
              </div>

      {sqs.length>0&&<>
        <div className="pp-sec">{isEN?'Short Questions':tr.sqSection}<span className="pp-sec-sub">[{num(smk)} {isEN?'marks':lang==='bn'?'নম্বর':'marks'}]</span></div>
        <div className="sq-two-col">
          {sqs.map((q,i)=>(
            <div key={q.id} className="qblock">
              <div className="qstem">
                <span className="qstem-num">{num(i+1)}.</span>
                <span style={{flex:1}}><SmartMText t={txt(q.stem,q.stemEn)}/></span>
                <span className="qmarks">{num(q.marks||5)}</span>

      {cqs.length>0&&<>
        <div className="pp-sec">{isEN?'Creative Questions':tr.cqSection}<span className="pp-sec-sub">[{num(cmk)} {isEN?'marks':lang==='bn'?'নম্বর':'marks'}]</span></div>

/* CQ preview sub-component */
function CQPreview({q,i,tr,lang,isEN,txt,num}){
  const subMeta=[
    {k:'subA',kEn:'subAEn',l:'ক',le:'a',m:1},
    {k:'subB',kEn:'subBEn',l:'খ',le:'b',m:2},
    {k:'subC',kEn:'subCEn',l:'গ',le:'c',m:3},
    {k:'subD',kEn:'subDEn',l:'ঘ',le:'d',m:4}
  ];
  return(
    <div className="qblock">
      <div className="qstem" style={{fontWeight:700}}>
        <span className="qstem-num">{num(i+1)}.</span>
        <span>{isEN?'Stimulus:':tr.stimulus+':'}</span>
      </div>
      {(q.stimulus||q.stimulusEn)&&<div className="cq-stim-box"><MText t={txt(q.stimulus,q.stimulusEn)}/></div>}
      {q.diagramImg&&<img src={q.diagramImg} alt="diagram" className="cq-stim-img"/>}
      <div className="cq-subs">
        {subMeta.map(sub=>{
          const content=txt(q[sub.k],q[sub.kEn]);
          return content?(
            <div key={sub.k} className="cq-si">
              <span className="cq-si-lbl">{isEN?sub.le:lang==='bn'?sub.l:sub.le})</span>
              <span style={{flex:1}}><MText t={content}/></span>
              <span className="cq-si-marks">{num(sub.m)}</span>
            </div>
          ):null;
        })}
      </div>
    </div>
  );
}

/* Bangla numeral helper */
function toBanglaNum(n){
  return String(n).replace(/[0-9]/g,d=>'০১২৩৪৫৬৭৮৯'[d]);
}

        <button className={'lang-btn'+(pm==='en'?' on':'')} style={{color:pm==='en'?'#059669':'#6b7299',background:pm==='en'?'#d1fae5':undefined}} onClick={()=>d({t:'SETTINGS',p:{paperMode:'en'}})}>📄EN{translatedCount>0?<span style={{fontSize:9,marginLeft:2,background:'#059669',color:'#fff',borderRadius:99,padding:'0 4px'}}>{translatedCount}</span>:null}</button>
      </div>
      {s.questions.length>0&&<span className="badge badge-mcq">{s.questions.length} Q</span>}
      <button className="btn btn-ghost" onClick={handlePrint} title="Print">🖨️</button>
      <button className="btn btn-primary" onClick={handleExport} disabled={exp}>
        {exp?<span className="spin">⟳</span>:'⬇️'} <span>{exp?'Exporting…':'Export PDF'}</span>
      </button>
      <button className="btn btn-ghost" onClick={clearAll} style={{color:'#dc2626'}} title="Clear all">🗑</button>
      <button className="btn btn-ghost" onClick={()=>d({t:'SETOPEN',p:true})} title="Settings">⚙️</button>
    </header>
  );
}

/* App */
function App(){
  const{s}=useApp();const tab=s.ui.tab;
  return(
    <div>
      <Toolbar/>
      {/* Hidden PDF target */}
      <div style={{position:'fixed',top:'-99999px',left:0,width:'794px',visibility:'hidden',zIndex:-1}} aria-hidden="true">
        <Preview forPDF={true}/>
      </div>
      <div className="main">
        <div className={'editor-col'+(tab==='preview'?' mob-hide':'')}>
          <HeaderEditor/>
          <ImgUpload/>
          <div>
            <div className="sec-hdr">Questions{s.questions.length>0&&<span className="badge badge-mcq" style={{marginLeft:8}}>{s.questions.length}</span>}</div>
            <QList/>
          </div>
        </div>
        <div className={'preview-col'+(tab==='preview'?' mob-show':'')}>
          <div className="preview-sticky">
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
              <div className="sec-hdr" style={{margin:0,flex:1}}>Live Preview</div>
              <span style={{fontSize:11,color:'#9ca3af'}}>A4 · Board standard</span>
            </div>
            <div className="prev-frame"><Preview/></div>
          </div>
        </div>
      </div>
      <div className="math-hint">
        💡 Math: <code>$x^2 + y^2$</code> inline &nbsp;|&nbsp; <code>$$\frac{"{a}"}{"{b}"}$$</code> block &nbsp;|&nbsp; বাং/EN toggle switches preview language
      </div>
      <Settings/>
      <Toast/>
    </div>
  );
}

function Root(){
  const[s,d]=useReducer(reducer,initState);
  return<Ctx.Provider value={{s,d}}><App/></Ctx.Provider>;
}
const container=document.getElementById('root');
const root=ReactDOM.createRoot(container);
root.render(React.createElement(Root));
</script>
</body>
</html>
